<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digiter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background"></div>
    <header>
        <img src="digiterlogo.png" alt="Digiter Logo" class="logo">
        <h1 class="title">Digiter</h1>
    </header>
    <div class="container">
        <h2 class="canvas-title">Draw any digit here</h2>
        <div class="canvas-container">
            <canvas id="canvas" class="drawing-canvas" width="280" height="280"></canvas>
        </div>
        <div class="button-container">
            <button id="clear" class="btn btn-clear">Clear</button>
            <button id="predict" class="btn btn-predict">Predict</button>
        </div>
        <div id="output-section">
            <h2>Classification Result</h2>
            <div id="result">-</div>
            <p id="confidence">Confidence: <span id="confidence-value">-</span></p>
        </div>
    </div>
</body>
</html>
